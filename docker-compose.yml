services:
  api:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SERVER_PORT=${SERVER_PORT:-8080}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-wishlist}
      - DB_PASSWORD=${DB_PASSWORD:-wishlist}
      - DB_NAME=${DB_NAME:-wishlist}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-secret-key}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-wishlist}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wishlist}
      POSTGRES_DB: ${DB_NAME:-wishlist}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wishlist}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${DB_USER:-wishlist}:${DB_PASSWORD:-wishlist}@db:5432/${DB_NAME:-wishlist}?sslmode=disable",
        "up"
      ]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
